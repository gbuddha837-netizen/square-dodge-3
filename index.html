<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Dodge 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #fff;
            z-index: 20;
            display: none;
            border: 3px solid #ff4444;
        }
        
        #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff4444;
        }
        
        #gameOverScreen p {
            font-size: 28px;
            margin: 10px 0;
        }
        
        #gameOverScreen button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #gameOverScreen button:hover {
            background: #45a049;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>📊 Score: <span id="score">0</span></div>
        <div>📈 Level: <span id="level">1</span></div>
        <div>❤️ Health: <span id="health">3</span></div>
    </div>
    
    <div id="gameOverScreen">
        <h1>💥 GAME OVER! 💥</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Level Reached: <span id="finalLevel">1</span></p>
        <button onclick="location.reload()">🔄 Play Again</button>
    </div>
    
    <div id="controls">
        🖱️ Desktop: Move Mouse | 📱 Mobile: Swipe to Move | Dodge the Bombs!
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game Variables
        let scene, camera, renderer;
        let player, bombs = [];
        let score = 0;
        let level = 1;
        let health = 3;
        let gameOver = false;
        let bombSpawnRate = 0.02;
        let maxBombs = 5;
        
        // Audio context
        let audioContext;
        
        // Touch/Mouse controls
        let playerTarget = { x: 0, z: 0 };
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue
            scene.fog = new THREE.Fog(0x87CEEB, 500, 1000);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 40);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 50, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Ground (Grass field)
            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x2d5016 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Player (Square character)
            const playerGeometry = new THREE.BoxGeometry(3, 3, 3);
            const playerMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x00ff00,
                metalness: 0.3,
                roughness: 0.4
            });
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.position.y = 2;
            player.castShadow = true;
            player.receiveShadow = true;
            scene.add(player);
            
            // Event listeners
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('touchmove', onTouchMove);
            window.addEventListener('resize', onWindowResize);
            
            // Initialize audio
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.log('Audio context not available');
            }
        }
        
        function onMouseMove(event) {
            if (isMobile) return;
            const x = (event.clientX / window.innerWidth) * 2 - 1;
            const y = -(event.clientY / window.innerHeight) * 2 + 1;
            playerTarget.x = x * 50;
            playerTarget.z = y * 50;
        }
        
        function onTouchMove(event) {
            const touch = event.touches[0];
            const x = (touch.clientX / window.innerWidth) * 2 - 1;
            const y = -(touch.clientY / window.innerHeight) * 2 + 1;
            playerTarget.x = x * 50;
            playerTarget.z = y * 50;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function createBomb() {
            const bombGeometry = new THREE.SphereGeometry(2, 16, 16);
            const bombMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x333333,
                metalness: 0.8,
                roughness: 0.2
            });
            const bomb = new THREE.Mesh(bombGeometry, bombMaterial);
            
            bomb.position.x = (Math.random() - 0.5) * 100;
            bomb.position.y = 50;
            bomb.position.z = (Math.random() - 0.5) * 100;
            
            bomb.castShadow = true;
            bomb.receiveShadow = true;
            
            bomb.velocity = {
                x: (Math.random() - 0.5) * 2,
                y: -Math.random() * 0.5 - 0.3,
                z: (Math.random() - 0.5) * 2
            };
            
            scene.add(bomb);
            bombs.push(bomb);
        }
        
        function playExplosionSound() {
            try {
                if (!audioContext) return;
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                
                osc.start(now);
                osc.stop(now + 0.2);
            } catch (e) {
                console.log('Audio error:', e);
            }
        }
        
        function createExplosionEffect(position) {
            // Flash effect
            const explosionLight = new THREE.PointLight(0xff6600, 3, 100);
            explosionLight.position.copy(position);
            scene.add(explosionLight);
            
            setTimeout(() => scene.remove(explosionLight), 300);
            
            // Explosion particles (shadow effect)
            const particleGeometry = new THREE.SphereGeometry(1, 8, 8);
            
            for (let i = 0; i < 12; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: new THREE.Color().setHSL(0.05 + Math.random() * 0.1, 1, 0.5)
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                particle.position.copy(position);
                particle.scale.set(0.5, 0.5, 0.5);
                
                scene.add(particle);
                
                const velocity = {
                    x: (Math.random() - 0.5) * 4,
                    y: Math.random() * 2 + 1,
                    z: (Math.random() - 0.5) * 4
                };
                
                let time = 0;
                const duration = 0.6;
                
                const animate = () => {
                    time += 0.016;
                    if (time < duration) {
                        particle.position.x += velocity.x * 0.016;
                        particle.position.y += velocity.y * 0.016;
                        particle.position.z += velocity.z * 0.016;
                        velocity.y -= 0.01;
                        particle.scale.multiplyScalar(0.95);
                        requestAnimationFrame(animate);
                    } else {
                        scene.remove(particle);
                    }
                };
                animate();
            }
        }
        
        function update() {
            if (gameOver) return;
            
            // Move player towards target
            const speed = 0.5;
            player.position.x += (playerTarget.x - player.position.x) * speed;
            player.position.z += (playerTarget.z - player.position.z) * speed;
            
            // Clamp player position
            player.position.x = Math.max(-50, Math.min(50, player.position.x));
            player.position.z = Math.max(-50, Math.min(50, player.position.z));
            
            // Rotate player slightly
            player.rotation.y += 0.005;
            
            // Update bombs
            for (let i = bombs.length - 1; i >= 0; i--) {
                const bomb = bombs[i];
                
                // Apply gravity
                bomb.velocity.y -= 0.01;
                bomb.position.add(new THREE.Vector3(bomb.velocity.x, bomb.velocity.y, bomb.velocity.z));
                
                // Rotate bomb
                bomb.rotation.x += 0.02;
                bomb.rotation.y += 0.02;
                
                // Check if bomb hit ground
                if (bomb.position.y < 1) {
                    // Explosion effect
                    createExplosionEffect(bomb.position);
                    playExplosionSound();
                    scene.remove(bomb);
                    bombs.splice(i, 1);
                    continue;
                }
                
                // Check collision with player
                const distance = player.position.distanceTo(bomb.position);
                if (distance < 4) {
                    // Hit!
                    health--;
                    document.getElementById('health').textContent = health;
                    
                    createExplosionEffect(bomb.position);
                    playExplosionSound();
                    scene.remove(bomb);
                    bombs.splice(i, 1);
                    
                    // Player knockback
                    const direction = new THREE.Vector3().subVectors(player.position, bomb.position).normalize();
                    player.position.addScaledVector(direction, 10);
                    
                    if (health <= 0) {
                        endGame();
                    }
                }
            }
            
            // Spawn new bombs
            if (Math.random() < bombSpawnRate && bombs.length < maxBombs) {
                createBomb();
            }
            
            // Increase score
            score++;
            document.getElementById('score').textContent = Math.floor(score / 10);
            
            // Increase difficulty
            if (score % 500 === 0) {
                level++;
                document.getElementById('level').textContent = level;
                bombSpawnRate = Math.min(0.1, bombSpawnRate + 0.01);
                maxBombs = Math.min(15, maxBombs + 1);
            }
        }
        
        function endGame() {
            gameOver = true;
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = Math.floor(score / 10);
            document.getElementById('finalLevel').textContent = level;
        }
        
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        
        init();
        animate();
    </script>
</body>
</html>
